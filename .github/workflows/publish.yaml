name: Publish docker image

# We publish the docker image as dev for pushes to main,
# and we create releases via Changesets for the tags.
on:
  workflow_call:
    inputs:
      tag_ref:
        description: 'A github ref passed from the publish workflow'
        required: true
        type: string
  push:
    branches:
      - main

env:
  publish_ref: ${{ case(github.event_name == 'workflow_call', inputs.tag_ref, github.ref) }}
concurrency:
  group: ${{ github.workflow }}-${{ case(github.event_name == 'workflow_call', inputs.tag_ref, github.ref) }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.publish_ref }}

      - uses: docker/setup-buildx-action@v4
        id: buildx

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          context: git
          images: |
            ghcr.io/eurosky-social/eurosky-portal
          tags: |
            type=sha,enable=true,priority=100,format=long
            type=match,pattern=v(\d+\.\d+\.\d+),group=1,enable=${{ startsWith(env.publish_ref, 'refs/tags/v') }}
            type=match,pattern=v(\d+\.\d+),group=1,enable=${{ startsWith(env.publish_ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(env.publish_ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ startsWith(env.publish_ref, 'refs/heads/main') }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          platforms: |
            linux/amd64
            linux/arm64
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
